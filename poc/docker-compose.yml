services:
  website:
    build: ./website
    container_name: poc-website
    restart: unless-stopped
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"

      # --- Platform subdomain (auto-provisioned, ZERO DNS config) ---
      # sslip.io wildcard DNS resolves any *.37.27.203.157.sslip.io host
      # straight to the VM IP, so no domain/nameserver setup is ever needed.
      - "traefik.http.routers.platform.rule=Host(`poc.37.27.203.157.sslip.io`)"
      - "traefik.http.routers.platform.entrypoints=websecure"
      - "traefik.http.routers.platform.tls=true"
      - "traefik.http.routers.platform.tls.certresolver=letsencrypt"

      # --- Custom domains (added when a customer points DNS to the VM) ---
      # These only serve once the domain's A record -> 37.27.203.157.
      - "traefik.http.routers.custom.rule=Host(`sukanya1426.me`,`www.sukanya1426.me`)"
      - "traefik.http.routers.custom.entrypoints=websecure"
      - "traefik.http.routers.custom.tls=true"
      - "traefik.http.routers.custom.tls.certresolver=letsencrypt"

      - "traefik.http.services.website.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-net"

networks:
  traefik-net:
    external: true
