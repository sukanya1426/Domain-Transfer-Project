<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigmoix Domain Onboarding Demo</title>
    <style>
        body { font-family: system-ui, sans-serif; text-align: center; padding: 50px; background: #f4f4f9; color: #333; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h1 { color: #2c3e50; }
        .success { color: #27ae60; font-weight: bold; margin-top: 20px; font-size: 1.1em; }
        .info { margin: 15px 0; background: #eee; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 1.1em;}
    </style>
</head>
<body>
    <div class="card">
        <h1>Sigmoix Domain Onboarding Demo</h1>
        <div class="info">
            <strong>Domain:</strong> <span id="domain">Loading...</span>
        </div>
        <div class="info">
            <strong>Time:</strong> <span id="time">Loading...</span>
        </div>
        <div class="success">✅ Successfully connected to the platform container!</div>
    </div>
    
    <script>
        document.getElementById('domain').textContent = window.location.hostname || 'Unknown';
        function updateTime() {
            document.getElementById('time').textContent = new Date().toISOString();
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
